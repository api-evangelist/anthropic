    rpm: 4000
    itpm: 2000000
    otpm: 400000
  - tier: Tier 4
    model: Claude Haiku 4.5
    rpm: 4000
    itpm: 4000000
    otpm: 800000
batchApiLimits:
  - tier: Tier 1
    rpm: 50
    queueMax: 100000
    perBatchMax: 100000
  - tier: Tier 2
    rpm: 1000
    queueMax: 200000
    perBatchMax: 100000
  - tier: Tier 3
    rpm: 2000
    queueMax: 300000
    perBatchMax: 100000
  - tier: Tier 4
    rpm: 4000
    queueMax: 500000
    perBatchMax: 100000
managedAgentLimits:
  - endpoint: Create endpoints (agents, sessions, environments)
    limit: 300
    window: minute
  - endpoint: Read endpoints (retrieve, list, stream)
    limit: 600
    window: minute
policies:
  - name: Cache-aware ITPM
    description: On most models, cache_read_input_tokens do NOT count toward ITPM, making prompt caching
      an effective way to increase throughput.
  - name: Auto tier advancement
    description: Tiers advance automatically based on cumulative credit purchase thresholds.
  - name: Acceleration limits
    description: Sharp usage spikes can trigger 429s independent of tier limits — ramp gradually.
