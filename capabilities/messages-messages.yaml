naftiko: 1.0.0-alpha2
info:
  label: Anthropic Messages API — Messages
  description: 'Anthropic Messages API — Messages. 1 operations. Lead operation: Anthropic Create A Message. Self-contained
    Naftiko capability covering one Anthropic business surface.'
  tags:
  - Anthropic
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: messages-messages
    baseUri: https://api.anthropic.com
    description: Anthropic Messages API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: v1-messages
      path: /v1/messages
      operations:
      - name: createmessage
        method: POST
        description: Anthropic Create A Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ANTHROPIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: messages-messages-rest
    port: 8080
    description: REST adapter for Anthropic Messages API — Messages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/messages
      name: v1-messages
      description: REST surface for v1-messages.
      operations:
      - method: POST
        name: createmessage
        description: Anthropic Create A Message
        call: messages-messages.createmessage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: messages-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Anthropic Messages API — Messages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: anthropic-create-message
      description: Anthropic Create A Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: messages-messages.createmessage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
