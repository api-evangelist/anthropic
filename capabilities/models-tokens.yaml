naftiko: 1.0.0-alpha2
info:
  label: Anthropic Models API — Tokens
  description: 'Anthropic Models API — Tokens. 1 operations. Lead operation: Anthropic Count Tokens In A Message. Self-contained
    Naftiko capability covering one Anthropic business surface.'
  tags:
  - Anthropic
  - Tokens
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: models-tokens
    baseUri: https://api.anthropic.com
    description: Anthropic Models API — Tokens business capability. Self-contained, no shared references.
    resources:
    - name: v1-messages-count_tokens
      path: /v1/messages/count_tokens
      operations:
      - name: counttokens
        method: POST
        description: Anthropic Count Tokens In A Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ANTHROPIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: models-tokens-rest
    port: 8080
    description: REST adapter for Anthropic Models API — Tokens. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/messages/count-tokens
      name: v1-messages-count-tokens
      description: REST surface for v1-messages-count_tokens.
      operations:
      - method: POST
        name: counttokens
        description: Anthropic Count Tokens In A Message
        call: models-tokens.counttokens
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: models-tokens-mcp
    port: 9090
    transport: http
    description: MCP adapter for Anthropic Models API — Tokens. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: anthropic-count-tokens-message
      description: Anthropic Count Tokens In A Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: models-tokens.counttokens
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
