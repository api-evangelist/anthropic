naftiko: 1.0.0-alpha2
info:
  label: Anthropic Managed Agents API — Sessions
  description: 'Claude Managed Agents — Sessions resource. 7 operations. Lead operation:
    Create Session. Run a stateful agent instance within an environment, drive
    execution by posting user events, and stream agent activity via SSE. Requires
    the managed-agents-2026-04-01 beta header.'
  tags:
  - Anthropic
  - Sessions
  - Managed Agents
  - Beta
  - Streaming
  created: '2026-05-22'
  modified: '2026-05-22'
binds:
- namespace: env
  keys:
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: managed-agents-sessions
    baseUri: https://api.anthropic.com
    description: Sessions API — create, drive, stream, and manage stateful agent
      executions.
    headers:
      anthropic-version: '2023-06-01'
      anthropic-beta: managed-agents-2026-04-01
    resources:
    - name: v1-sessions
      path: /v1/sessions
      operations:
      - name: createsession
        method: POST
        description: Anthropic Create Session
        outputRawFormat: json
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
      - name: listsessions
        method: GET
        description: Anthropic List Sessions
        outputRawFormat: json
        inputParameters:
        - name: agent_id
          in: query
          type: string
        - name: status
          in: query
          type: string
    - name: v1-sessions-id
      path: /v1/sessions/{session_id}
      operations:
      - name: getsession
        method: GET
        description: Anthropic Get Session
        outputRawFormat: json
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
      - name: updatesession
        method: POST
        description: Anthropic Update Session
        outputRawFormat: json
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
      - name: deletesession
        method: DELETE
        description: Anthropic Delete Session
        outputRawFormat: json
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
    - name: v1-sessions-events
      path: /v1/sessions/{session_id}/events
      operations:
      - name: sendsessionevents
        method: POST
        description: Anthropic Send Session Events
        outputRawFormat: json
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          required: true
    - name: v1-sessions-stream
      path: /v1/sessions/{session_id}/stream
      operations:
      - name: streamsession
        method: GET
        description: Anthropic Stream Session Events
        outputRawFormat: text
        inputParameters:
        - name: session_id
          in: path
          type: string
          required: true
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ANTHROPIC_API_KEY}}'
      placement: header
  exposes:
  - type: mcp
    namespace: managed-agents-sessions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Managed Agents — Sessions.
    tools:
    - name: anthropic-create-session
      description: Anthropic Create Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: managed-agents-sessions.createsession
      with:
        body: tools.body
    - name: anthropic-list-sessions
      description: Anthropic List Sessions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: managed-agents-sessions.listsessions
      with:
        agent_id: tools.agent_id
        status: tools.status
    - name: anthropic-get-session
      description: Anthropic Get Session
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: managed-agents-sessions.getsession
      with:
        session_id: tools.session_id
    - name: anthropic-send-session-events
      description: Anthropic Send Session Events
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: managed-agents-sessions.sendsessionevents
      with:
        session_id: tools.session_id
        body: tools.body
    - name: anthropic-delete-session
      description: Anthropic Delete Session
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: managed-agents-sessions.deletesession
      with:
        session_id: tools.session_id
