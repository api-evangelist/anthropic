naftiko: 1.0.0-alpha2
info:
  label: Anthropic Files API — Files
  description: 'Anthropic Files API — Files. 5 operations. Lead operation: Anthropic List Files. Self-contained Naftiko capability
    covering one Anthropic business surface.'
  tags:
  - Anthropic
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ANTHROPIC_API_KEY: ANTHROPIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-files
    baseUri: https://api.anthropic.com/v1
    description: Anthropic Files API — Files business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: listfiles
        method: GET
        description: Anthropic List Files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createfile
        method: POST
        description: Anthropic Create File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: files-file_id
      path: /files/{file_id}
      operations:
      - name: getfilemetadata
        method: GET
        description: Anthropic Get File Metadata
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletefile
        method: DELETE
        description: Anthropic Delete File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: files-file_id-content
      path: /files/{file_id}/content
      operations:
      - name: downloadfilecontent
        method: GET
        description: Anthropic Download File Content
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.ANTHROPIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: files-files-rest
    port: 8080
    description: REST adapter for Anthropic Files API — Files. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: listfiles
        description: Anthropic List Files
        call: files-files.listfiles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfile
        description: Anthropic Create File
        call: files-files.createfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{file-id}
      name: files-file-id
      description: REST surface for files-file_id.
      operations:
      - method: GET
        name: getfilemetadata
        description: Anthropic Get File Metadata
        call: files-files.getfilemetadata
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefile
        description: Anthropic Delete File
        call: files-files.deletefile
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{file-id}/content
      name: files-file-id-content
      description: REST surface for files-file_id-content.
      operations:
      - method: GET
        name: downloadfilecontent
        description: Anthropic Download File Content
        call: files-files.downloadfilecontent
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Anthropic Files API — Files. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: anthropic-list-files
      description: Anthropic List Files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-files.listfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: anthropic-create-file
      description: Anthropic Create File
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: files-files.createfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: anthropic-get-file-metadata
      description: Anthropic Get File Metadata
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-files.getfilemetadata
      outputParameters:
      - type: object
        mapping: $.
    - name: anthropic-delete-file
      description: Anthropic Delete File
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: files-files.deletefile
      outputParameters:
      - type: object
        mapping: $.
    - name: anthropic-download-file-content
      description: Anthropic Download File Content
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-files.downloadfilecontent
      outputParameters:
      - type: object
        mapping: $.
