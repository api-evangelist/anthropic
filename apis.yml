position: Consuming
description: >-
  Anthropic is an AI safety company and creator of the Claude family of large language models (Opus, Sonnet, Haiku). The
  Claude API provides access to Claude models for text generation, vision, tool use, extended thinking, batch
  processing, and agentic workflows including managed agents, skills, memory, compaction, and computer use. Anthropic
  also publishes the open Model Context Protocol (MCP) for standardized AI tool integration and ships Claude Code, the
  terminal-based agentic coding tool.
