aid: anthropic
url: https://raw.githubusercontent.com/api-evangelist/anthropic/refs/heads/main/apis.yml
apis:
  - aid: anthropic:anthropic-messages-api
    name: Anthropic Messages API
    tags:
      - AI
      - Artificial Intelligence
      - Messages
    humanURL: https://docs.anthropic.com/en/api/messages
    properties:
      - url: https://docs.anthropic.com/en/api/messages
        type: Documentation
      - url: https://docs.anthropic.com/en/api/messages-streaming
        type: Documentation
      - url: openapi/anthropic-messages-api-openapi.yml
        type: OpenAPI
      - url: json-schema/anthropic-message-schema.json
        type: JSONSchema
      - url: json-schema/anthropic-tool-use-schema.json
        type: JSONSchema
      - url: json-ld/anthropic-context.jsonld
        type: JSONLD
    description: Send a structured list of input messages with text and/or image content, and the model
      will generate the next message in the conversation. The Messages API supports text, images, tool
      use, extended thinking, streaming, and structured output.
  - aid: anthropic:anthropic-models-api
    name: Anthropic Models API
    tags:
      - AI
      - Artificial Intelligence
      - Models
    humanURL: https://docs.anthropic.com/en/api/models-list
    properties:
      - url: https://docs.anthropic.com/en/api/models-list
        type: Documentation
      - url: properties/anthropic-models-api-openapi.yml
        type: OpenAPI
    description: Send a structured list of input messages with text and/or image content, and the model
      will generate the next message in the conversation.
  - aid: anthropic:anthropic-message-batches-api
    name: Anthropic Message Batches API
    tags:
      - AI
      - Artificial Intelligence
      - Batches
      - Messages
    humanURL: https://docs.anthropic.com/en/api/creating-message-batches
    properties:
      - url: https://docs.anthropic.com/en/api/creating-message-batches
        type: Documentation
      - url: properties/anthropic-message-batches-api-openapi.yml
        type: OpenAPI
    description: Send a batch of Message creation requests. The Message Batches API can be used to process
      multiple Messages API requests at once. Once a Message Batch is created, it begins processing immediately.
      Batches can take up to 24 hours to complete.
  - aid: anthropic:anthropic-files-api
    name: Anthropic Files API
    tags:
      - AI
      - Artificial Intelligence
      - Files
    humanURL: https://docs.anthropic.com/en/api/files-create
    properties:
      - url: https://docs.anthropic.com/en/api/files-create
        type: Documentation
      - url: properties/anthropic-files-api-openapi.yml
        type: OpenAPI
    description: The Files API allows you to upload and manage files to use with the Anthropic API without
      having to re-upload content with each request. For more information about the Files API, see the
      developer guide for files.
  - aid: anthropic:anthropic-admin-api
    name: Anthropic Admin API
    tags:
      - Administrative
      - AI
      - Artificial Intelligence
    humanURL: https://docs.anthropic.com/en/api/admin-api/users/get-user
    properties:
      - url: https://docs.anthropic.com/en/api/admin-api/users/get-user
        type: Documentation
      - url: properties/anthropic-admin-api-openapi.yml
        type: OpenAPI
    description: Manage administrative functions.
  - aid: anthropic:anthropic-prompts-api
    name: Anthropic Prompts API
    tags:
      - AI
      - Artificial Intelligence
      - Prompts
    humanURL: https://docs.anthropic.com/en/api/prompt-tools-generate
    properties:
      - url: https://docs.anthropic.com/en/api/prompt-tools-generate
        type: Documentation
      - url: properties/anthropic-prompts-api-openapi.yml
        type: OpenAPI
    description: Manage prompts.
  - aid: anthropic:anthropic-token-counting-api
    name: Anthropic Token Counting API
    tags:
      - AI
      - Artificial Intelligence
      - Counting
      - Tokens
    humanURL: https://docs.anthropic.com/en/api/messages-count-tokens
    properties:
      - url: https://docs.anthropic.com/en/api/messages-count-tokens
        type: Documentation
      - url: properties/anthropic-token-counting-api-openapi.yml
        type: OpenAPI
    description: Count the number of tokens in a Message, including tools, images, and documents, without
      creating it. The Token Count API accepts the same structured list of inputs for creating a message,
      including support for system prompts, tools, images, and PDFs. Token counting is free to use but
      subject to requests per minute rate limits.
  - aid: anthropic:anthropic-skills-api
    name: Anthropic Skills API
    tags:
      - Agents
      - AI
      - Artificial Intelligence
      - Skills
    humanURL: https://docs.anthropic.com/en/api/skills/create-skill
    properties:
      - url: https://docs.anthropic.com/en/api/skills/create-skill
        type: Documentation
      - url: properties/anthropic-skills-api-openapi.yml
        type: OpenAPI
    description: Create and manage custom agent skills. Skills allow you to package domain expertise and
      organizational workflows for use with Claude. The Skills API is currently in beta and requires the
      skills-2025-10-02 beta header.
  - aid: anthropic:anthropic-usage-cost-api
    name: Anthropic Usage & Cost API
    tags:
      - Administration
      - AI
      - Artificial Intelligence
      - Cost
      - Usage
    humanURL: https://docs.anthropic.com/en/api/usage-cost-api
    properties:
      - url: https://docs.anthropic.com/en/api/usage-cost-api
        type: Documentation
    description: Programmatically access your organization's API usage and cost data with the Usage &
      Cost Admin API. The Usage API tracks token consumption across your organization with detailed breakdowns
      by model, workspace, and service tier via the /v1/organizations/usage_report/messages endpoint.
      The Cost API retrieves service-level cost breakdowns in USD via the /v1/organizations/cost_report
      endpoint. Requires an Admin API key.
  - aid: anthropic:anthropic-claude-code-analytics-api
    name: Anthropic Claude Code Analytics API
    tags:
      - Administration
      - AI
      - Analytics
      - Artificial Intelligence
      - Claude Code
    humanURL: https://docs.anthropic.com/en/api/claude-code-analytics-api
    properties:
      - url: https://docs.anthropic.com/en/api/claude-code-analytics-api
        type: Documentation
    description: Programmatically access your organization's Claude Code usage analytics and productivity
      metrics with the Claude Code Analytics Admin API. Track sessions, lines of code, commits, pull requests,
      and tool usage via the /v1/organizations/usage_report/claude_code endpoint. Provides daily aggregated
      user-level data with model breakdowns and estimated costs. Requires an Admin API key.
