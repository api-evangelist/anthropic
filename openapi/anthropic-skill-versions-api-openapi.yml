openapi: 3.1.0
info:
  title: Anthropic Admin Agents Skill Versions API
  description: Manage administrative functions for Anthropic organizations, workspaces, users, invites, and API keys.
  version: 1.0.0
  contact:
    name: Anthropic
    url: https://www.anthropic.com
    email: support@anthropic.com
  license:
    name: Anthropic API License
    url: https://www.anthropic.com/terms
servers:
- url: https://api.anthropic.com/v1
  description: Production Server
security:
- AdminApiKeyAuth: []
tags:
- name: Skill Versions
  description: Manage versions of a Skill
paths:
  /v1/skills/{skill_id}/versions:
    get:
      summary: Anthropic List Skill Versions
      description: Paginated list of versions for the given Skill.
      operationId: listSkillVersions
      tags:
      - Skill Versions
      parameters:
      - $ref: '#/components/parameters/AnthropicVersion'
      - $ref: '#/components/parameters/AnthropicBeta'
      - $ref: '#/components/parameters/SkillIdPath'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List of Skill versions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersionList'
        4XX:
          $ref: '#/components/responses/ErrorResponse'
    post:
      summary: Anthropic Create Skill Version
      description: Upload a new version of an existing Skill.
      operationId: createSkillVersion
      tags:
      - Skill Versions
      parameters:
      - $ref: '#/components/parameters/AnthropicVersion'
      - $ref: '#/components/parameters/AnthropicBeta'
      - $ref: '#/components/parameters/SkillIdPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateSkillVersionRequest'
      responses:
        '200':
          description: Skill version created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersion'
        4XX:
          $ref: '#/components/responses/ErrorResponse'
  /v1/skills/{skill_id}/versions/{version}:
    get:
      summary: Anthropic Get Skill Version
      description: Retrieve metadata for a specific Skill version.
      operationId: getSkillVersion
      tags:
      - Skill Versions
      parameters:
      - $ref: '#/components/parameters/AnthropicVersion'
      - $ref: '#/components/parameters/AnthropicBeta'
      - $ref: '#/components/parameters/SkillIdPath'
      - $ref: '#/components/parameters/VersionPath'
      responses:
        '200':
          description: Skill version metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillVersion'
        4XX:
          $ref: '#/components/responses/ErrorResponse'
components:
  responses:
    ErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  parameters:
    AnthropicVersion:
      name: anthropic-version
      in: header
      required: true
      schema:
        type: string
        default: '2023-06-01'
    SkillIdPath:
      name: skill_id
      in: path
      required: true
      schema:
        type: string
    VersionPath:
      name: version
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    AnthropicBeta:
      name: anthropic-beta
      in: header
      required: true
      description: Must include skills-2025-10-02.
      schema:
        type: string
        default: skills-2025-10-02
  schemas:
    CreateSkillVersionRequest:
      type: object
      required:
      - skill_archive
      properties:
        skill_archive:
          type: string
          format: binary
    SkillVersionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SkillVersion'
        has_more:
          type: boolean
    SkillVersion:
      type: object
      properties:
        id:
          type: string
        skill_id:
          type: string
        version:
          type: string
        created_at:
          type: string
          format: date-time
        size_bytes:
          type: integer
    Error:
      type: object
      properties:
        type:
          type: string
        error:
          type: object
          properties:
            type:
              type: string
            message:
              type: string
  securitySchemes:
    AdminApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
      description: Your Admin API key for authentication (starts with sk-ant-admin...).
